services:
  eebus-bridge:
    build:
      context: ./eebus-bridge
    ports:
      - "50051:50051"
      - "4712:4712"
    volumes:
      - eebus-data:/data
      - ./eebus-bridge/config.yaml:/etc/eebus-bridge/config.yaml:ro
    environment:
      # Set to "true" to enable EEBUS protocol logging (shows all measurements and signals)
      - DEBUG_EEBUS_PROTOCOL=true
      # Set to "true" to enable debug event logging
      - EEBUS_DEBUG_EVENTS=true
    network_mode: host
    restart: unless-stopped

volumes:
  eebus-data:
