services:
  eebus-bridge:
    image: ghcr.io/volschin/eebus-bridge:latest
    build:
      context: ./eebus-bridge
    volumes:
      - eebus-data:/data
      - ./eebus-bridge/config.yaml:/etc/eebus-bridge/config.yaml:ro
    # host networking required: SHIP device discovery uses mDNS multicast (_ship._tcp)
    # which cannot cross Docker bridge network boundaries.
    # gRPC is protected by binding to 127.0.0.1 (see grpc.bind in config.yaml).
    network_mode: host
    restart: unless-stopped

volumes:
  eebus-data:
