name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

jobs:
  # Detect which paths changed so Go jobs can be skipped when irrelevant
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      proto: ${{ steps.filter.outputs.proto }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - 'eebus-bridge/**'
              - '.github/workflows/ci.yml'
            proto:
              - 'eebus-bridge/proto/**'
              - 'generate_proto.sh'

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eebus-bridge
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0 # renovate: datasource=github-releases depName=golangci/golangci-lint-action
        with:
          working-directory: eebus-bridge
          version: v2.12.2
      - run: go test -v -race ./...
      - run: go test -tags=integration -v ./internal/grpc/ -run TestIntegration
      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4 # renovate: datasource=github-releases depName=golang/govulncheck-action
        with:
          work-dir: eebus-bridge
      - run: go build ./cmd/eebus-bridge/

  docker:
    needs: go
    if: needs.go.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0 # renovate: datasource=github-releases depName=hadolint/hadolint-action
        with:
          dockerfile: eebus-bridge/Dockerfile
      - run: docker build -t eebus-bridge ./eebus-bridge

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov ruff homeassistant voluptuous grpcio protobuf pip-audit
      - name: Lint with ruff
        run: ruff check custom_components/
      - name: Audit production dependencies
        run: |
          pip-audit --requirement /dev/stdin <<'EOF'
          grpcio>=1.78.0
          protobuf>=4.25.0
          EOF
      - name: Run tests with coverage
        run: PYTHONPATH=. pytest --cov --cov-report=term-missing -v

  proto-drift:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Regenerate proto stubs
        run: bash generate_proto.sh
      - name: Check for stub drift
        run: git diff --exit-code custom_components/eebus/generated/

  release-draft:
    needs: [go, docker, test, proto-drift]
    # Runs exactly once on push to main, only when all quality gates pass.
    # Go, docker, and proto-drift may be skipped (no relevant files changed) — acceptable.
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.go.result == 'success' || needs.go.result == 'skipped') &&
      (needs.docker.result == 'success' || needs.docker.result == 'skipped') &&
      (needs.proto-drift.result == 'success' || needs.proto-drift.result == 'skipped') &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: read
    steps:
      - name: Wait for HACS and Hassfest workflows
        uses: int128/wait-for-workflows-action@e365eab32d5afa48a03363aea1b96e60fe115e6e # v1.79.0
        with:
          filter-workflow-name: "HACS,Hassfest"
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
