name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

jobs:
  # Detect which paths changed so Go jobs can be skipped when irrelevant
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      proto: ${{ steps.filter.outputs.proto }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - 'eebus-bridge/**'
              - '.github/workflows/ci.yml'
            proto:
              - 'eebus-bridge/proto/**'
              - 'generate_proto.sh'

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eebus-bridge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache-dependency-path: eebus-bridge/go.sum
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0 # renovate: datasource=github-releases depName=golangci/golangci-lint-action
        with:
          working-directory: eebus-bridge
          version: v2.12.2
      - run: go test -v -race ./...
      - run: go test -tags=integration -v ./internal/grpc/ -run TestIntegration
      - name: govulncheck
        # Invoke govulncheck directly instead of golang/govulncheck-action: the
        # action runs its own internal actions/checkout, which collides with the
        # already-persisted credentials and fails with
        # `remote: Duplicate header: "Authorization"` (HTTP 400). The repo is
        # already checked out and Go is already set up above.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - run: go build ./cmd/eebus-bridge/

  docker:
    needs: go
    if: needs.go.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0 # renovate: datasource=github-releases depName=hadolint/hadolint-action
        with:
          dockerfile: eebus-bridge/Dockerfile
      - run: docker build -t eebus-bridge ./eebus-bridge

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov ruff homeassistant voluptuous grpcio protobuf pip-audit
      - name: Lint with ruff
        run: ruff check custom_components/
      - name: Audit production dependencies
        run: |
          pip-audit --requirement /dev/stdin <<'EOF'
          grpcio>=1.78.0
          protobuf>=4.25.0
          EOF
      - name: Run tests with coverage
        run: PYTHONPATH=. pytest --cov --cov-report=term-missing -v

  proto-drift:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Regenerate proto stubs
        run: bash generate_proto.sh
      - name: Check for stub drift
        run: git diff --exit-code custom_components/eebus/generated/

  release-draft:
    needs: [go, docker, test, proto-drift]
    # Runs exactly once on push to main, only when all quality gates pass.
    # Go, docker, and proto-drift may be skipped (no relevant files changed) — acceptable.
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.go.result == 'success' || needs.go.result == 'skipped') &&
      (needs.docker.result == 'success' || needs.docker.result == 'skipped') &&
      (needs.proto-drift.result == 'success' || needs.proto-drift.result == 'skipped') &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: read
    steps:
      - name: Wait for HACS and Hassfest workflows
        uses: int128/wait-for-workflows-action@456c3b39b5e122319b40ffad07b8179731f8291c # v1.82.0
        with:
          filter-workflow-name: "HACS,Hassfest"
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
