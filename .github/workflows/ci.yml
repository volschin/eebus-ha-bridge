name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

jobs:
  # Detect which paths changed so Go jobs can be skipped when irrelevant
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - 'eebus-bridge/**'
              - '.github/workflows/ci.yml'

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eebus-bridge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - run: go vet ./...
      - run: go test -v -race ./...
      - run: go test -tags=integration -v ./internal/grpc/ -run TestIntegration
      - run: go build ./cmd/eebus-bridge/

  docker:
    needs: go
    if: needs.go.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: docker build -t eebus-bridge ./eebus-bridge

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov ruff homeassistant voluptuous grpcio protobuf
      - name: Lint with ruff
        run: ruff check custom_components/
      - name: Run tests with coverage
        run: PYTHONPATH=. pytest --cov --cov-report=term-missing -v

  release-draft:
    needs: [go, docker, test]
    # Runs exactly once on push to main, only when all quality gates pass.
    # Go and docker may be skipped (no Go files changed) — that is acceptable.
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.go.result == 'success' || needs.go.result == 'skipped') &&
      (needs.docker.result == 'success' || needs.docker.result == 'skipped') &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: read
    steps:
      - name: Wait for HACS and Hassfest workflows
        uses: int128/wait-for-workflows-action@8d9015cd3363b3ee64d438b6a25ddea5a15b42b9 # v1.74.0
        with:
          filter-workflow-name: "HACS,Hassfest"
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
