name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

jobs:
  # Detect which paths changed so Go jobs can be skipped when irrelevant
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      proto: ${{ steps.filter.outputs.proto }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            go:
              - 'eebus-bridge/**'
              - 'scripts/check_go_patch_coverage.py'
              - 'scripts/tests/test_check_go_patch_coverage.py'
              - 'docs/badges/go-coverage.svg'
              - '.github/workflows/ci.yml'
            python:
              - 'custom_components/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            proto:
              - 'eebus-bridge/proto/**'
              - 'eebus-bridge/gen/proto/**'
              - 'custom_components/eebus/generated/**'
              - 'generate_proto.sh'
              - 'buf.yaml'
              - 'buf.gen.yaml'
              - 'proto-tools.env'
              - 'scripts/proto_*.py'
              - 'scripts/check_proto_*.py'
              - 'scripts/check_generated_drift.sh'
              - 'custom_components/eebus/proto_stubs.py'
              - 'custom_components/eebus/tests/test_proto_postprocess.py'
              - 'docs/proto-contract-matrix.md'

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eebus-bridge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          check-latest: true
          cache-dependency-path: eebus-bridge/go.sum
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0 # renovate: datasource=github-releases depName=golangci/golangci-lint-action
        with:
          working-directory: eebus-bridge
          version: v2.12.2
      - run: go test -v -race ./...
      - name: Test Go patch coverage checker
        run: python3 -m unittest discover -s ../scripts/tests -p 'test_check_go_patch_coverage.py' -v
      - name: Generate productive Go coverage
        run: go test -count=1 -coverprofile=coverage.out ./cmd/eebus-bridge ./cmd/eebus-watch ./internal/...
      - name: Enforce Go coverage
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out | tee coverage-summary.txt
          read -r covered_statements total_statements <<< "$(awk 'NR > 1 {
            total += $2
            if ($3 > 0) covered += $2
          } END {print covered, total}' coverage.out)"
          awk -v covered="$covered_statements" -v total="$total_statements" 'BEGIN {
            actual = 100 * covered / total
            if (actual + 1e-9 < 83.0) {
              printf "Go total coverage %.1f%% is below required 83.0%%\n", actual > "/dev/stderr"
              exit 1
            }
          }'

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            coverage_base="$(git -C .. merge-base "origin/$BASE_REF" HEAD)"
          elif [[ -n "$BEFORE_SHA" ]] && git -C .. cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            coverage_base="$BEFORE_SHA"
          else
            coverage_base="$(git -C .. hash-object -t tree /dev/null)"
          fi
          python3 ../scripts/check_go_patch_coverage.py \
            --repository .. \
            --profile coverage.out \
            --base "$coverage_base" \
            --threshold 90 \
            --badge-output ../docs/badges/go-coverage.svg
          git -C .. diff --exit-code -- docs/badges/go-coverage.svg
      - run: go test -tags=integration -v ./internal/grpc/ -run TestIntegration
      - name: govulncheck
        # Invoke govulncheck directly instead of golang/govulncheck-action: the
        # action runs its own internal actions/checkout, which collides with the
        # already-persisted credentials and fails with
        # `remote: Duplicate header: "Authorization"` (HTTP 400). The repo is
        # already checked out and Go is already set up above.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - run: go build ./cmd/eebus-bridge/

  docker:
    needs: go
    if: needs.go.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0 # renovate: datasource=github-releases depName=hadolint/hadolint-action
        with:
          dockerfile: eebus-bridge/Dockerfile
      - run: docker build -t eebus-bridge ./eebus-bridge

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov ruff mypy grpc-stubs homeassistant voluptuous grpcio protobuf pip-audit
      - name: Lint with ruff
        run: ruff check custom_components/
      - name: Type check with mypy
        run: mypy custom_components/eebus
      - name: Audit production dependencies
        run: |
          pip-audit --requirement /dev/stdin <<'EOF'
          grpcio>=1.78.0
          protobuf>=4.25.0
          EOF
      - name: Run tests with coverage
        run: PYTHONPATH=. pytest -m "not cross_language" --cov --cov-report=term-missing -v

  cross-language:
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          check-latest: true
          cache-dependency-path: eebus-bridge/go.sum
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Install contract-test dependencies
        run: pip install pytest pytest-asyncio homeassistant voluptuous "grpcio==1.78.0" "protobuf>=4.25.0"
      - name: Run Go/Python contract harness
        run: PYTHONPATH=. pytest -m cross_language -v custom_components/eebus/tests/test_cross_language_contract.py

  proto-governance:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          check-latest: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Install pinned buf
        run: |
          set -euo pipefail
          source proto-tools.env
          mkdir -p .cache/proto-tools/bin
          GOBIN="$PWD/.cache/proto-tools/bin" go install "github.com/bufbuild/buf/cmd/buf@v${BUF_VERSION}"
      - name: Buf lint
        run: .cache/proto-tools/bin/buf lint
      - name: Buf breaking check
        if: github.event_name == 'pull_request'
        run: .cache/proto-tools/bin/buf breaking --against ".git#branch=origin/${{ github.base_ref }},subdir=eebus-bridge/proto"
      - name: Check scoped cardinality waivers
        if: github.event_name == 'pull_request'
        run: python scripts/check_proto_cardinality.py "origin/${{ github.base_ref }}"
      - name: Regenerate proto stubs
        run: PYTHON_BIN=python bash generate_proto.sh
      - name: Check for stub drift
        run: bash scripts/check_generated_drift.sh
      - name: Check proto_stubs exports
        run: PYTHONPATH=. python scripts/check_proto_stubs_exports.py
      - name: Check v1 governance rules
        run: python scripts/check_proto_governance.py

  
