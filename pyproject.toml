[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["custom_components/eebus/tests"]

[tool.coverage.run]
source_pkgs = ["custom_components.eebus"]
omit = [
    "custom_components/eebus/tests/*",
    "custom_components/eebus/generated/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__",
    "if TYPE_CHECKING",
]

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["custom_components/eebus/generated"]
