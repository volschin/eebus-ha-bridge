rules:
  action-setup:
    status: exempt
    comment: Integration does not provide service actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow:
    status: done
    comment: Host/port, explicit loopback or TLS+token security, and device selection are all configured and connection-tested in the flow.
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not provide service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done
  action-exceptions:
    status: exempt
    comment: Integration does not provide service actions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: done
    comment: UNAUTHENTICATED responses trigger a credential replacement flow that verifies the CA certificate and token before reload.
  test-coverage: done
  devices: done
  diagnostics:
    status: done
    comment: Device SKI, TLS CA certificate, and authentication token are explicitly redacted and covered by diagnostics tests.
  discovery:
    status: done
    comment: mDNS-based EEBUS/SHIP Discovery via Bridge gRPC API.
  discovery-update-info:
    status: exempt
    comment: Network info updated via bridge, not directly via HA discovery.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions:
    status: done
    comment: README lists the DHW water heater, boost, room-heating climate control, device operating state diagnostic, and device-provided constraints/options.
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: One EEBUS device per config entry.
  entity-category:
    status: done
    comment: Read-only operational state and limit/status entities are categorized as diagnostics.
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: done
    comment: Reconfigure updates host/port in one step and loopback or TLS+token settings in a dedicated security step, preserving a blank existing token.
  repair-issues:
    status: exempt
    comment: Authentication failures start reauthentication; other connection issues are communicated via availability and logging.
  stale-devices:
    status: exempt
    comment: One device per config entry, removed on unload.
  async-dependency: done
  inject-websession:
    status: exempt
    comment: No aiohttp/HTTP client used; talks to the bridge over gRPC only.
  strict-typing: done
