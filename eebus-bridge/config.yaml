grpc:
  port: 50051
  # bind to 127.0.0.1 (default) to restrict gRPC to local access only.
  # A non-loopback bind is rejected unless security.mode is tls_token.
  bind: "127.0.0.1"
  # enable_reflection exposes gRPC service metadata for tools like grpcurl.
  # Keep false in production.
  enable_reflection: false
  security:
    # loopback keeps existing local installations plaintext and requires a
    # loopback bind. Remote installations must use tls_token.
    mode: "loopback"
    # Required in tls_token mode; all three values are file paths.
    # tls_cert_file: "/etc/eebus-bridge/grpc/server.crt"
    # tls_key_file: "/etc/eebus-bridge/grpc/server.key"
    # token_file: "/etc/eebus-bridge/grpc/token"

eebus:
  port: 4712
  vendor: "HomeAssistant"
  brand: "eebus-bridge"
  model: "eebus-bridge"
  serial: "ha-001"

certificates:
  auto_generate: true
  storage_path: "/data/certs"

ohpcf:
  # enabled turns on the CEM client for Optimization of Self-Consumption by Heat
  # Pump Compressor Flexibility (OHPCF). On by default; set to false to disable.
  enabled: true

experimental:
  # mgcp_provider exposes a local grid-connection-point so a heat pump (e.g.
  # Vaillant VR940) can read the live grid / PV-surplus situation and run its
  # own energy management. Home Assistant feeds the data via GridService.
  # Requires myVAILLANT commissioning (trust + energy-management enabled) to
  # take effect. Off by default.
  mgcp_provider: false
