syntax = "proto3";

package eebus.v1;

option go_package = "github.com/volschin/eebus-bridge/gen/proto/eebus/v1;eebusv1";

import "eebus/v1/common.proto";
import "google/protobuf/timestamp.proto";

service MonitoringService {
  rpc GetPowerConsumption(DeviceRequest) returns (PowerMeasurement);
  rpc GetEnergyConsumed(DeviceRequest) returns (EnergyMeasurement);
  rpc GetMeasurements(DeviceRequest) returns (MeasurementList);
  rpc GetDeviceDiagnostics(DeviceRequest) returns (DeviceDiagnosticsData);
  rpc SubscribeMeasurements(DeviceRequest) returns (stream MeasurementEvent);
}

message EnergyMeasurement {
  double kilowatt_hours = 1;
  google.protobuf.Timestamp timestamp = 2;
}

message MeasurementList {
  repeated MeasurementEntry measurements = 1;
}

message DeviceDiagnosticsData {
  string operating_state = 1;
  google.protobuf.Timestamp timestamp = 2;
}

message MeasurementEvent {
  string ski = 1;
  MeasurementEventType event_type = 2;
  oneof data {
    PowerMeasurement power = 3;
    EnergyMeasurement energy = 4;
    MeasurementEntry measurement = 5;
    DeviceDiagnosticsData device_diagnostics = 6;
    MeasurementList measurements = 7;
  }
  MeasurementUpdateField update_field = 8;
}

enum MeasurementUpdateField {
  MEASUREMENT_UPDATE_FIELD_UNSPECIFIED = 0;
  MEASUREMENT_UPDATE_FIELD_POWER_PER_PHASE = 1;
  MEASUREMENT_UPDATE_FIELD_ENERGY_PRODUCED = 2;
  MEASUREMENT_UPDATE_FIELD_CURRENT_PER_PHASE = 3;
  MEASUREMENT_UPDATE_FIELD_VOLTAGE_PER_PHASE = 4;
  MEASUREMENT_UPDATE_FIELD_FREQUENCY = 5;
}

enum MeasurementEventType {
  MEASUREMENT_EVENT_UNSPECIFIED = 0;
  MEASUREMENT_EVENT_POWER_UPDATED = 1;
  MEASUREMENT_EVENT_ENERGY_UPDATED = 2;
  MEASUREMENT_EVENT_DHW_TEMPERATURE_UPDATED = 3;
  MEASUREMENT_EVENT_DHW_TEMPERATURE_SUPPORT_UPDATED = 4;
  MEASUREMENT_EVENT_ROOM_TEMPERATURE_UPDATED = 5;
  MEASUREMENT_EVENT_ROOM_TEMPERATURE_SUPPORT_UPDATED = 6;
  MEASUREMENT_EVENT_OUTDOOR_TEMPERATURE_UPDATED = 7;
  MEASUREMENT_EVENT_OUTDOOR_TEMPERATURE_SUPPORT_UPDATED = 8;
  MEASUREMENT_EVENT_FLOW_TEMPERATURE_UPDATED = 9;
  MEASUREMENT_EVENT_RETURN_TEMPERATURE_UPDATED = 10;
  MEASUREMENT_EVENT_DEVICE_OPERATING_STATE_UPDATED = 11;
  MEASUREMENT_EVENT_POWER_PER_PHASE_UPDATED = 12;
  MEASUREMENT_EVENT_ENERGY_PRODUCED_UPDATED = 13;
  MEASUREMENT_EVENT_CURRENT_PER_PHASE_UPDATED = 14;
  MEASUREMENT_EVENT_VOLTAGE_PER_PHASE_UPDATED = 15;
  MEASUREMENT_EVENT_FREQUENCY_UPDATED = 16;
}
