syntax = "proto3";

package eebus.v1;

option go_package = "github.com/volschin/eebus-bridge/gen/proto/eebus/v1;eebusv1";

import "eebus/v1/common.proto";

// VisualizationService drives the bridge's VAPD (Visualization of Aggregated
// Photovoltaic Data) and VABD (Visualization of Aggregated Battery Data)
// providers. Home Assistant pushes live PV / battery figures so a consumer such
// as the Vaillant VR940 can read them and display the home's PV/battery state in
// the myVAILLANT app (§1.3.3, display-only).
//
// The bridge is the PVSystem / BatterySystem data provider; HA calls the publish
// RPCs whenever a mapped sensor changes state. Unary (not streaming) to mirror
// the LPC/grid write path and survive reconnects without resubscription. Either
// provider may be disabled, in which case its RPC returns Unavailable.
service VisualizationService {
  rpc PublishPVData(PVData) returns (Empty);
  rpc PublishBatteryData(BatteryData) returns (Empty);
}

message PVData {
  // Momentary total AC power produced by the PV system, in watts (VAPD
  // scenario 2). Conventionally non-negative (production).
  double power_w = 1;
  // Cumulative AC yield energy in Wh (VAPD scenario 3). Optional; omit when Home
  // Assistant has no yield energy sensor mapped.
  optional double yield_wh = 2;
  // Nominal peak power of the PV system in watts (VAPD scenario 1). Optional;
  // typically a static configured value, omit when unknown.
  optional double peak_power_w = 3;
}

message BatteryData {
  // Momentary total AC power at the battery, in watts (VABD scenario 1).
  double power_w = 1;
  // Cumulative charged energy in Wh (VABD scenario 2). Optional.
  optional double charged_wh = 2;
  // Cumulative discharged energy in Wh (VABD scenario 3). Optional.
  optional double discharged_wh = 3;
  // State of charge in percent, 0-100 (VABD scenario 4). Optional; omit when no
  // state-of-charge sensor is mapped.
  optional double state_of_charge_pct = 4;
}
