syntax = "proto3";

package eebus.v1;

option go_package = "github.com/volschin/eebus-bridge/gen/proto/eebus/v1;eebusv1";

import "eebus/v1/common.proto";
import "eebus/v1/dhw_service.proto";
import "eebus/v1/hvac_service.proto";
import "eebus/v1/lpc_service.proto";
import "eebus/v1/monitoring_service.proto";
import "eebus/v1/ohpcf_service.proto";
import "google/protobuf/timestamp.proto";

service DeviceService {
  rpc GetStatus(Empty) returns (ServiceStatus);
  rpc GetServerInfo(Empty) returns (ServerInfo);
  rpc GetDeviceStatus(DeviceRequest) returns (DeviceStatus);
  rpc GetDeviceCapabilities(DeviceRequest) returns (DeviceCapabilities);
  rpc ListDiscoveredDevices(Empty) returns (ListDevicesResponse);
  rpc RegisterRemoteSKI(RegisterSKIRequest) returns (Empty);
  rpc UnregisterRemoteSKI(RegisterSKIRequest) returns (Empty);
  rpc ListPairedDevices(Empty) returns (ListPairedDevicesResponse);
  rpc SubscribeDeviceEvents(Empty) returns (stream DeviceEvent);
  rpc SubscribeDeviceState(DeviceRequest) returns (stream DeviceStateEvent);
}

enum CapabilityId {
  CAPABILITY_UNSPECIFIED = 0;
  CAPABILITY_MONITORING = 1;
  CAPABILITY_LPC = 2;
  CAPABILITY_FAILSAFE = 3;
  CAPABILITY_HEARTBEAT = 4;
  CAPABILITY_OHPCF = 5;
  CAPABILITY_DHW = 6;
  CAPABILITY_DHW_SYSTEM_FUNCTION = 7;
  CAPABILITY_ROOM_HEATING = 8;
}

enum CapabilityState {
  CAPABILITY_STATE_UNKNOWN = 0;
  CAPABILITY_STATE_AVAILABLE = 1;
  CAPABILITY_STATE_TEMPORARILY_UNAVAILABLE = 2;
  CAPABILITY_STATE_UNSUPPORTED = 3;
}

enum CapabilityReason {
  CAPABILITY_REASON_UNSPECIFIED = 0;
  CAPABILITY_REASON_LOCAL_DISABLED = 1;
  CAPABILITY_REASON_REMOTE_NOT_ADVERTISED = 2;
  CAPABILITY_REASON_ENTITY_NOT_BOUND = 3;
  CAPABILITY_REASON_READ_FAILED = 4;
  CAPABILITY_REASON_DEVICE_DISCONNECTED = 5;
}

message DeviceCapability {
  CapabilityId id = 1;
  CapabilityState state = 2;
  CapabilityReason reason = 3;
  google.protobuf.Timestamp last_changed = 4;
}

message DeviceCapabilities {
  string ski = 1;
  repeated DeviceCapability capabilities = 2;
}

message ServiceStatus {
  bool running = 1;
  string local_ski = 2;
}

// ServerInfo is the stable, non-secret compatibility contract published by
// the bridge. Feature identifiers are append-only; clients must ignore values
// they do not know yet.
message ServerInfo {
  uint32 api_major = 1;
  uint32 api_minor = 2;
  string bridge_build_version = 3;
  repeated FeatureId features = 4;
  string local_ski = 5;
}

enum FeatureId {
  FEATURE_UNSPECIFIED = 0;
  FEATURE_EXPLICIT_CAPABILITIES = 1;
  FEATURE_CONSOLIDATED_DEVICE_STREAM = 2;
  FEATURE_DEVICE_SNAPSHOT = 3;
  FEATURE_PROVIDER_SAMPLE_INVALIDATION = 4;
  FEATURE_TYPED_MEASUREMENTS = 5;
}

message DeviceStatus {
  bool connected = 1;
  google.protobuf.Timestamp last_transition = 2;
}

message DiscoveredDevice {
  string ski = 1;
  string brand = 2;
  string model = 3;
  string serial = 4;
  string device_type = 5;
  string host = 6;
}

message ListDevicesResponse {
  repeated DiscoveredDevice devices = 1;
}

message RegisterSKIRequest {
  string ski = 1;
}

message PairedDevice {
  string ski = 1;
  string brand = 2;
  string model = 3;
  string serial = 4;
  string device_type = 5;
  repeated string supported_use_cases = 6;
}

message ListPairedDevicesResponse {
  repeated PairedDevice devices = 1;
}

message DeviceEvent {
  string ski = 1;
  DeviceEventType event_type = 2;
}

// DeviceStateEvent is the ordered, device-scoped replacement for the legacy
// domain streams. The first envelope always carries a resync_required payload
// because the stream intentionally does not duplicate the full polling
// snapshot.
message DeviceStateEvent {
  string ski = 1;
  uint64 revision = 2;
  google.protobuf.Timestamp event_time = 3;
  oneof payload {
    DeviceEvent device = 4;
    MeasurementEvent measurement = 5;
    LPCEvent lpc = 6;
    DeviceStateDHWEvent dhw = 7;
    RoomHeatingEvent hvac = 8;
    OHPCFEvent ohpcf = 9;
    DeviceCapabilities capability = 10;
    ResyncRequired resync_required = 11;
  }
  EventAvailability availability = 12;
}

// EventAvailability makes an adapter read failure explicit. An update event
// with TEMPORARILY_UNAVAILABLE never means that the value was successfully
// refreshed, even when its domain payload is absent.
enum EventAvailability {
  EVENT_AVAILABILITY_UNSPECIFIED = 0;
  EVENT_AVAILABILITY_AVAILABLE = 1;
  EVENT_AVAILABILITY_TEMPORARILY_UNAVAILABLE = 2;
  EVENT_AVAILABILITY_UNSUPPORTED = 3;
}

message DeviceStateDHWEvent {
  oneof payload {
    DHWEvent temperature = 1;
    DHWSystemFunctionEvent system_function = 2;
  }
}

message ResyncRequired {
  ResyncReason reason = 1;
  uint64 dropped_events = 2;
}

enum ResyncReason {
  RESYNC_REASON_UNSPECIFIED = 0;
  RESYNC_REASON_INITIAL_STATE_REQUIRED = 1;
  RESYNC_REASON_EVENT_DROPPED = 2;
  RESYNC_REASON_UNCLASSIFIED_EVENT = 3;
}

enum DeviceEventType {
  DEVICE_EVENT_UNSPECIFIED = 0;
  DEVICE_EVENT_CONNECTED = 1;
  DEVICE_EVENT_DISCONNECTED = 2;
  DEVICE_EVENT_TRUST_REMOVED = 3;
  DEVICE_EVENT_PROVIDER_UPDATED = 4;
}
